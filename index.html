    top: 0;

  .masthead h1 {
    font-family: 'Playfair Display', serif;

  .masthead .byline {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.3rem;

  .stats {

    font-size: 0.75rem;
    color: var(--muted);

  .stats .count {

    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
    line-height: 1;

  .controls {
    padding: 1rem 3rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    background: var(--paper);
    position: sticky;
    top: 108px;
    z-index: 99;
  }

  .search-wrap {

    flex: 1;
    min-width: 200px;

    border: 1.5px solid var(--ink);
    background: white;
    padding: 0.5rem 0.75rem 0.5rem 2rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.85rem;

    content: "⌕";
    position: absolute;
    left: 0.6rem;
    top: 50%;
    transform: translateY(-50%);

    font-size: 1rem;

    gap: 0.4rem;
    flex-wrap: wrap;

    font-size: 0.65rem;

    letter-spacing: 0.08em;

    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);

    gap: 0;
    border-top: 1px solid var(--rule);

    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;

    font-size: 0.65rem;

</style>

const types = [...new Set(appearances.map(a => a.type))].sort();
let activeType = null;
let activeYear = null;
let activeOutlet = null;

function clearFilters() {
  activeType = null;
  activeYear = null;
  activeOutlet = null;
  document.getElementById('search').value = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  render();
}

function getYear(date) {
  return date ? date.split('-')[0] : 'Undated';
}

// Build type filter buttons
const filterWrap = document.getElementById('type-filters');
types.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = t;
  btn.onclick = () => {
    activeType = activeType === t ? null : t;
    document.querySelectorAll('#type-filters .filter-btn').forEach(b => b.classList.remove('active'));
    if (activeType) btn.classList.add('active');
    render();
  };
  filterWrap.appendChild(btn);
});

// Build year filter buttons
const years = [...new Set(appearances.map(a => getYear(a.date)))]
  .sort((a, b) => {
    if (a === 'Undated') return 1;
    if (b === 'Undated') return -1;
    return b.localeCompare(a);
  });
const yearWrap = document.getElementById('year-filters');
years.forEach(y => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = y;
  btn.onclick = () => {
    activeYear = activeYear === y ? null : y;
    document.querySelectorAll('#year-filters .filter-btn').forEach(b => b.classList.remove('active'));
    if (activeYear) btn.classList.add('active');
    render();
  };
  yearWrap.appendChild(btn);
});

// Build outlet filter buttons (top 6 by frequency)
const outletCounts = appearances.reduce((acc, a) => {
  acc[a.outlet] = (acc[a.outlet] || 0) + 1;
  return acc;
}, {});
const topOutlets = Object.entries(outletCounts)
  .sort((a, b) => b[1] - a[1])
  .slice(0, 6)
  .map(([outlet]) => outlet);
const outletWrap = document.getElementById('outlet-filters');
topOutlets.forEach(o => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = o;
  btn.onclick = () => {
    activeOutlet = activeOutlet === o ? null : o;
    document.querySelectorAll('#outlet-filters .filter-btn').forEach(b => b.classList.remove('active'));
    if (activeOutlet) btn.classList.add('active');
    render();
  };
  outletWrap.appendChild(btn);
});

function getFavicon(url) {
  if (!url) return null;
  try {
    const domain = new URL(url).hostname;
    return `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
  } catch { return null; }
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}

function render() {
  const query = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;

  let filtered = appearances.filter(a => {
    const matchText = !query || a.title.toLowerCase().includes(query) || a.outlet.toLowerCase().includes(query);
    const matchType = !activeType || a.type === activeType;
    const matchYear = !activeYear || getYear(a.date) === activeYear;
    const matchOutlet = !activeOutlet || a.outlet === activeOutlet;
    return matchText && matchType && matchYear && matchOutlet;
  });

  if (sort === 'date-desc') {
    filtered.sort((a, b) => {
      if (!a.date && !b.date) return 0;
      if (!a.date) return 1;
      if (!b.date) return -1;
      return b.date.localeCompare(a.date);
    });
  } else if (sort === 'date-asc') {
    filtered.sort((a, b) => {
      if (!a.date && !b.date) return 0;
      if (!a.date) return 1;
      if (!b.date) return -1;
      return a.date.localeCompare(b.date);
    });
  } else if (sort === 'outlet') {
    filtered.sort((a, b) => a.outlet.localeCompare(b.outlet));
  }

  document.getElementById('total-count').textContent = appearances.length;
  document.getElementById('result-info').textContent =
    filtered.length === appearances.length
      ? `Showing all ${appearances.length} appearances`
      : `Showing ${filtered.length} of ${appearances.length} appearances`;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No appearances match your search.</div>';
    return;
  }

  const showGroups = (sort === 'date-desc' || sort === 'date-asc') && !activeYear;
  let currentYear = null;

  filtered.forEach((a, i) => {
    if (showGroups) {
      const yearLabel = getYear(a.date);
      if (yearLabel !== currentYear) {
        currentYear = yearLabel;
        const divider = document.createElement('div');
        divider.className = 'year-divider';
        divider.textContent = yearLabel;
        grid.appendChild(divider);
      }
    }

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i * 0.02, 0.3)}s`;
    const favicon = getFavicon(a.url);
    const faviconHtml = favicon ? `<img class="outlet-favicon" src="${favicon}" alt="" onerror="this.style.display='none'">` : '';
    card.innerHTML = `
      <div class="card-outlet">${faviconHtml}${a.outlet}</div>
      <div class="card-title">${a.url ? `<a href="${a.url}" target="_blank" rel="noopener">${a.title}</a>` : a.title}</div>
      <div class="card-meta">
        <span class="card-date">${formatDate(a.date)}</span>
        <span class="card-type">${a.type}</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

render();
</script>
